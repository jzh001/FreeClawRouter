# FreeClawRouter Configuration — last verified 2026-03-17
# Copy this file to config.local.yaml for local overrides (git-ignored).
# API keys are read from environment variables — never hardcode them here.
#
# Model selection philosophy:
#   Each provider lists 2–3 models covering distinct tradeoffs:
#     • Powerful  — largest/most capable model (best reasoning/coding)
#     • Balanced  — best quality-per-token workhorse
#     • Fast      — smallest/fastest model (high throughput, simple tasks)
#
# Model tags (used in the router's capability sheet):
#   reasoning    — built-in chain-of-thought / thinking mode
#   coding       — specialised for code generation and software engineering
#   agentic      — strong at multi-step tool use and autonomous tasks
#   fast         — optimised for low latency / high throughput
#   multimodal   — accepts image / video / audio input
#   large_context — context window ≥ 256 K tokens
#   moe          — Mixture of Experts (high quality relative to active params)
#   multilingual — strong non-English language support
#
# is_reasoning: true — model allocates internal CoT tokens before answering.
#   Best for hard tasks; slower and more token-expensive for trivial ones.
#
# Priority order rationale:
#   1. Cerebras   — highest RPM+RPD, wafer-scale silicon, proven reliability
#   2. NVIDIA NIM — highest RPM (40), NO daily cap (credit-based); scoring gets
#                   +20 for no daily limit — promotes heavy use of free credits
#   3. Groq       — excellent RPM but lower RPD (1K) on most models
#   4. Google AI  — moderate limits (10 RPM, 250 RPD); huge 1M context window
#   5. OpenRouter — aggregates free models; lowest RPD (200)
#   6. SambaNova  — very limited free tier (20 RPD); save for hard reasoning
#   7. Mistral    — most restrictive (2 RPM); last resort

providers:

  # --------------------------------------------------------------------------
  # Cerebras — wafer-scale silicon; fastest inference speeds available
  # Sign up: https://cloud.cerebras.ai  (no credit card required)
  # Free limits: 30 RPM, 14,400 RPD, 60K TPM, 1M TPD
  #   Note: qwen3-235b preview has 30K TPM limit (lower than llama3.1-8b).
  # --------------------------------------------------------------------------
  cerebras:
    enabled: true
    base_url: "https://api.cerebras.ai/v1"
    api_key: "${CEREBRAS_API_KEY}"
    priority: 1
    rate_limits:
      rpm: 30
      rpd: 14400
      tpm: 30000      # conservative: qwen-3-235b has 30K TPM; llama3.1-8b has 60K
      tpd: 1000000
    models:
      # POWERFUL — 235B MoE; largest available model on Cerebras (preview)
      - id: "qwen-3-235b-a22b-instruct-2507"
        context_window: 65536
        description: "Qwen 3 235B A22B MoE (Jul 2025, preview). Largest model on Cerebras free tier. Strong general reasoning, coding, and instruction following."
        tags: [coding, reasoning, moe, agentic]
        is_reasoning: false
        priority: 1

      # FAST — lightweight; highest sustained throughput on Cerebras hardware
      - id: "llama3.1-8b"
        context_window: 8192
        description: "Llama 3.1 8B (Jul 2024). Production model; ~2,200 t/s — use for simple, high-volume tasks where speed matters more than capability."
        tags: [fast]
        is_reasoning: false
        priority: 2

  # --------------------------------------------------------------------------
  # NVIDIA Build (NIM) — credit-based free tier (1,000 credits at signup)
  # Sign up: https://build.nvidia.com  (requires phone verification)
  # Free limits: ~40 RPM; credits depleted over time (not a hard RPD cap).
  # Priority 2: highest RPM of all providers; no daily cap → scoring +20 bonus.
  # --------------------------------------------------------------------------
  nvidia_nim:
    enabled: true
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key: "${NVIDIA_API_KEY}"
    priority: 2
    rate_limits:
      rpm: 40
    models:
      # POWERFUL (REASONING+RAG) — 262K context, hybrid architecture
      - id: "nvidia/nemotron-3-super-120b-a12b"
        context_window: 262144
        description: "NVIDIA Nemotron Super 120B MoE (2024). 262K context; Mamba-Transformer hybrid; NVIDIA's agentic flagship. Excellent RAG, tool use, long-context reasoning."
        tags: [agentic, large_context, moe, reasoning]
        is_reasoning: false
        priority: 1

      # CODING POWERHOUSE — state-of-the-art agentic coding, 262K context
      - id: "qwen/qwen3-coder-480b-a35b-instruct"
        context_window: 262144
        description: "Qwen3 Coder 480B A35B Instruct (Jul 2025). SOTA coding and agentic model; 480B MoE / 35B active; 262K context. Best open coding model available. Beats GPT-4o on code benchmarks."
        tags: [coding, agentic, moe, large_context]
        is_reasoning: false
        priority: 2

      # REASONING (mid) — strong open reasoning at moderate latency
      - id: "qwen/qwq-32b"
        context_window: 131072
        description: "QwQ 32B (Mar 2025). Alibaba's dedicated reasoning model; 128K context. Competitive with DeepSeek-R1 and o1-mini on math/coding benchmarks. Better latency than Nemotron 120B."
        tags: [reasoning, coding]
        is_reasoning: true
        priority: 3

      # BALANCED — capable 70B model; strong tool calling + coding
      - id: "meta/llama-3.3-70b-instruct"
        context_window: 131072
        description: "Llama 3.3 70B Instruct (Dec 2024). Meta's current production flagship on NIM. Strong coding, tool calling, and instruction following. Free within NIM credits."
        tags: [coding, agentic]
        is_reasoning: false
        priority: 4

      # BALANCED (GENERAL) — capable mid-size instruction model
      - id: "mistralai/mistral-small-24b-instruct"
        context_window: 32768
        description: "Mistral Small 24B Instruct 2501 (Jan 2025). Compact but capable instruction model; strong multilingual and general-purpose. Good balance of quality and latency."
        tags: [multilingual, agentic]
        is_reasoning: false
        priority: 5

      # FAST — lightweight 8B model; highest throughput for simple tasks
      - id: "meta/llama-3.1-8b-instruct"
        context_window: 131072
        description: "Llama 3.1 8B Instruct (Jul 2024). Lightweight fast model on NIM. Use for high-volume simple tasks to preserve credits of larger models."
        tags: [fast]
        is_reasoning: false
        priority: 6

  # --------------------------------------------------------------------------
  # Groq — LPU inference; ultra-low latency
  # Sign up: https://console.groq.com  (no credit card required)
  # Free limits: 30 RPM, 1,000 RPD (most models); llama-3.1-8b-instant 14,400 RPD
  # Note: Kimi K2 and Llama 4 Scout are preview — may have tighter limits.
  # --------------------------------------------------------------------------
  groq:
    enabled: true
    base_url: "https://api.groq.com/openai/v1"
    api_key: "${GROQ_API_KEY}"
    priority: 3
    rate_limits:
      rpm: 30
      rpd: 1000
      tpm: 30000
    models:
      # POWERFUL (CODING/AGENTIC) — 60 RPM free; top coding + tool use
      - id: "moonshotai/kimi-k2-instruct-0905"
        context_window: 262144
        description: "Kimi K2 0905 1T MoE (Jun 2025, 32B active). Best coding and agentic model on Groq. 60 RPM free — highest-throughput strong model here. 262K context."
        tags: [coding, agentic, moe]
        is_reasoning: false
        priority: 1

      # BALANCED — flagship general-purpose at fast LPU speeds
      - id: "openai/gpt-oss-120b"
        context_window: 131072
        description: "OpenAI open-weights 120B (Dec 2025). Groq's current production flagship. Strong coding, reasoning, instruction following."
        tags: [coding, agentic]
        is_reasoning: false
        priority: 2

      # MULTIMODAL — Llama 4 Scout; useful when image inputs are needed
      - id: "meta-llama/llama-4-scout-17b-16e-instruct"
        context_window: 131072
        description: "Llama 4 Scout 17B MoE (Apr 2025). Meta's latest open model; multimodal (text+image). Use when visual input or frontier multimodal is needed."
        tags: [multimodal, moe, agentic]
        is_reasoning: false
        priority: 3

      # FAST — highest RPD on Groq; 14,400 req/day for simple tasks
      - id: "llama-3.1-8b-instant"
        context_window: 131072
        description: "Llama 3.1 8B Instant (Jul 2024). 14,400 RPD — highest daily quota on Groq by far. Use for simple/fast tasks at scale to preserve larger-model quotas."
        tags: [fast]
        is_reasoning: false
        priority: 4

  # --------------------------------------------------------------------------
  # Google AI Studio (Gemini API)
  # Sign up: https://aistudio.google.com  (free, no credit card)
  # Free limits vary per model; check https://aistudio.google.com/rate-limit
  # Note: gemini-3.1-pro-preview has NO free API tier (paid only at $2/M tokens).
  #       Use the web UI at aistudio.google.com for free interactive access.
  # --------------------------------------------------------------------------
  google_ai:
    enabled: true
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key: "${GOOGLE_AI_API_KEY}"
    priority: 4
    rate_limits:
      rpm: 10
      rpd: 250
      tpm: 250000
    models:
      # POWERFUL — latest frontier (preview); free on AI Studio API
      - id: "gemini-3-flash-preview"
        context_window: 1000000
        description: "Gemini 3 Flash Preview (Feb 2026). Google's latest frontier model; free via AI Studio. 1M context, multimodal, tool calling. Successor to 2.5 Flash."
        tags: [reasoning, multimodal, large_context, agentic]
        is_reasoning: false
        priority: 1

      # BALANCED — stable production model with 1M context
      - id: "gemini-2.5-flash"
        context_window: 1000000
        description: "Gemini 2.5 Flash (late 2025). Proven production workhorse; thinking mode supported; 1M context; multimodal. Use when preview stability is a concern."
        tags: [reasoning, multimodal, large_context, fast, agentic]
        is_reasoning: false
        priority: 2

      # FAST — lightest frontier model; highest free RPD
      - id: "gemini-3.1-flash-lite-preview"
        context_window: 1000000
        description: "Gemini 3.1 Flash-Lite Preview (Mar 2026). Fastest and cheapest Gemini; 1M context. Use for high-throughput simple tasks where quota matters most."
        tags: [fast, large_context, multimodal]
        is_reasoning: false
        priority: 3

  # --------------------------------------------------------------------------
  # OpenRouter — aggregates 29+ free models
  # Sign up: https://openrouter.ai  (200 RPD with payment method on file)
  # Free limits: ~20 RPM, 50–200 RPD per model
  # --------------------------------------------------------------------------
  openrouter:
    enabled: true
    base_url: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"
    priority: 5
    rate_limits:
      rpm: 20
      rpd: 200
    models:
      # LARGE CONTEXT — 262K context + reasoning + RAG specialist
      - id: "nvidia/nemotron-3-super-120b-a12b:free"
        context_window: 262144
        description: "NVIDIA Nemotron Super 120B MoE (2024) via OpenRouter. 262K context; hybrid Mamba-Transformer; excellent for RAG, summarisation, and long-document agentic tasks."
        tags: [agentic, large_context, moe, reasoning]
        is_reasoning: false
        priority: 1

      # AUTO — OpenRouter's smart free-model router; no quota overhead
      - id: "openrouter/free"
        context_window: 200000
        description: "OpenRouter free auto-router (always latest). Automatically selects the best currently-available free model. Use as fallback when specific models are down."
        tags: [agentic]
        is_reasoning: false
        priority: 2

  # --------------------------------------------------------------------------
  # SambaNova Cloud — fast inference; restrictive free tier
  # Sign up: https://cloud.sambanova.ai  (no credit card required)
  # Free limits: 20 RPM, 20 RPD, 200K TPD  (very limited without card)
  # --------------------------------------------------------------------------
  sambanova:
    enabled: true
    base_url: "https://api.sambanova.ai/v1"
    priority: 6
    api_key: "${SAMBANOVA_API_KEY}"
    rate_limits:
      rpm: 20
      rpd: 20
      tpd: 200000
    models:
      # POWERFUL (REASONING) — best open reasoning model; save for hardest tasks
      # - id: "DeepSeek-R1-0528"
      #   context_window: 163840
      #   description: "DeepSeek R1 0528 (May 2025). Latest R1 update; 671B MoE / 37B active; best open reasoning model. Given 20 RPD limit, reserve for genuinely hard tasks."
      #   tags: [reasoning, moe]
      #   is_reasoning: true
      #   priority: 1

      # FAST — reliable workhorse for when R1 quota is exhausted
      - id: "Meta-Llama-3.3-70B-Instruct"
        context_window: 131072
        description: "Llama 3.3 70B (Dec 2024). Reliable workhorse with tool calling. Use when R1 daily limit is exhausted and a capable fallback is needed."
        tags: [agentic]
        is_reasoning: false
        priority: 2

  # --------------------------------------------------------------------------
  # Mistral AI — free Experiment plan
  # Sign up: https://console.mistral.ai  → select Experiment tier
  # Free limits: ~2 RPM, ~1B tokens/month (very limited — prototyping only)
  # Note: Devstral 2 and Codestral moved to paid. Magistral Small/Medium paid.
  # --------------------------------------------------------------------------
  mistral:
    enabled: true
    base_url: "https://api.mistral.ai/v1"
    api_key: "${MISTRAL_API_KEY}"
    priority: 7
    rate_limits:
      rpm: 2
      tpm: 100000
    models:
      # POWERFUL — Mistral's unified flagship (multimodal + coding + reasoning)
      - id: "mistral-small-2603"
        context_window: 256000
        description: "Mistral Small 4 (Mar 16 2026). 119B hybrid MoE; 256K context; multimodal; unifies reasoning + Devstral coding + vision. Best free Mistral model."
        tags: [coding, multimodal, large_context, moe, agentic]
        is_reasoning: false
        priority: 1

      # BALANCED — large frontier model on the Experiment plan
      - id: "mistral-large-2512"
        context_window: 131072
        description: "Mistral Large 2 (Dec 2025). Most capable Mistral on free tier. Strong reasoning and multilingual support."
        tags: [reasoning, multilingual]
        is_reasoning: false
        priority: 2

      # FAST — lightweight open-weight model
      - id: "open-mistral-nemo"
        context_window: 131072
        description: "Mistral NeMo 12B (Jul 2024). Lightweight open-weight model; fast and multilingual. Use for simple tasks to preserve quota of larger models."
        tags: [fast, multilingual]
        is_reasoning: false
        priority: 3

# ---------------------------------------------------------------------------
# Local LLM (Ollama) — optional but recommended
# Ollama runs on the HOST machine (not inside Docker) so it can use GPU.
# If Ollama is not installed or not running, FreeClawRouter gracefully skips
# local routing and returns a clear error instead of crashing.
# Install: https://ollama.com  — then run: ollama pull phi4-mini
# ---------------------------------------------------------------------------
local:
  ollama:
    base_url: "http://host.docker.internal:11434"
    router_model: "phi4-mini"      # model used for routing decisions (must be fast)
    fallback_model: "phi4-mini"    # model used for actual inference fallback
    fallback_enabled: true          # set to false or use "none" via dashboard to disable

# ---------------------------------------------------------------------------
# Proxy server settings
# ---------------------------------------------------------------------------
proxy:
  port: 8765
  host: "0.0.0.0"
  log_level: "info"
  output_token_reserve: 4096
  memory_warning_threshold: 0.80
  memory_critical_threshold: 0.90
  local_only_threshold: "disabled"  # disabled | simple | moderate | always
                                    # "disabled" = always prefer cloud APIs; local is last resort only
  router_mode: "local"              # local | python | api
                                    # local  = use local Ollama LLM for routing decisions (default)
                                    # python = deterministic Python scoring only (fastest, no LLM call)
                                    # api    = use a fast cloud API model for routing decisions
