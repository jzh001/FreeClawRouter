# ---------------------------------------------------------------------------
# FreeClawRouter Docker Compose Stack
#
# Services:
#   freeclawrouter  — the OpenAI-compatible reverse proxy (port 8765)
#   openclaw        — the AI agent (configured to point at freeclawrouter)
#
# Ollama runs on the HOST machine (not in Docker) so that:
#   • Models are shared — no duplicate storage
#   • Apple Silicon gets native Metal GPU acceleration
#   • Linux/Windows GPU drivers are available without Docker passthrough
#
# Before starting: install Ollama from https://ollama.com and run:
#   ollama pull gpt-oss:20b
#
# Security (PRD §4):
#   • openclaw runs as a non-root user with no host volume mounts
#   • openclaw has no access to /etc, /home, /root, /var, etc.
#   • openclaw is isolated on its own network segment
#   • API keys are never exposed to openclaw containers
# ---------------------------------------------------------------------------

networks:
  agent_net:
    driver: bridge
    # openclaw lives here; no direct internet, routes through freeclawrouter
    internal: false   # openclaw needs outbound for web tools; freeclawrouter handles LLM traffic

volumes:
  freeclawrouter_data:
    driver: local

services:

  # --------------------------------------------------------------------------
  # FreeClawRouter — reverse proxy
  # --------------------------------------------------------------------------
  freeclawrouter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freeclawrouter_proxy
    restart: unless-stopped
    networks:
      - agent_net
    ports:
      - "8765:8765"
    # host.docker.internal resolves to the host machine from inside Docker.
    # On Linux this requires Docker 20.10+ or the extra_hosts entry below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FREECLAWROUTER_DATA_DIR=/app/data
      - OPENCLAW_CONFIG_DIR=/app/openclaw_config
    env_file:
      # Create a .env file in this directory with your API keys:
      #   CEREBRAS_API_KEY=...
      #   GROQ_API_KEY=...
      #   GOOGLE_AI_API_KEY=...
      #   OPENROUTER_API_KEY=...
      #   NVIDIA_API_KEY=...
      #   SAMBANOVA_API_KEY=...
      #   MISTRAL_API_KEY=...
      - .env
    volumes:
      # Persistent SQLite database for the dashboard (survives restarts)
      - type: volume
        source: freeclawrouter_data
        target: /app/data
      # Mount a local config override if you want to customise without rebuilding
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true
      # Optionally mount a local override:
      # - type: bind
      #   source: ./config.local.yaml
      #   target: /app/config.local.yaml
      #   read_only: true
      # OpenClaw config directory — writable so the Channels dashboard tab can save settings
      - type: bind
        source: ./openclaw_config
        target: /app/openclaw_config
        read_only: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------------------------
  # OpenClaw — the AI agent (sandboxed)
  # PRD §4: zero host filesystem access, no root volume mounts
  # --------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: freeclawrouter_openclaw
    restart: unless-stopped
    networks:
      - agent_net
    depends_on:
      freeclawrouter:
        condition: service_healthy
    # Security: read-only root filesystem; only explicitly defined volumes mounted
    read_only: true
    # Minimal writable tmpfs for runtime state only
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /run:size=64m,mode=755
    # No host paths are mounted (PRD §4.2)
    volumes:
      # Mount only the agent config directory (no host root access)
      - type: bind
        source: ./openclaw_config
        target: /home/node/.openclaw
        read_only: false
    environment:
      # Point OpenClaw at FreeClawRouter instead of real OpenAI
      - OPENAI_BASE_URL=http://freeclawrouter:8765/v1
      # A dummy key is required syntactically; FreeClawRouter ignores it and uses
      # the real provider keys from its own .env
      - OPENAI_API_KEY=freeclawrouter-local-key
    # Drop all Linux capabilities for maximum isolation
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
